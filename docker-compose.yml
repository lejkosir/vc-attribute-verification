#version: "3.8"

services:
  ca:
    build: ./vc-ca
    container_name: vc-ca
    ports:
      - "8000:8000"
    volumes:
      - ./data/keys:/app/keys
    restart: always

  verifier:
    build: ./verifier-site
    container_name: verifier-site
    ports:
      - "5000:5000"
    depends_on:
      - ca
    restart: always